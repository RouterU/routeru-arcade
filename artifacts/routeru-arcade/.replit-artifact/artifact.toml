kind = "web"
previewPath = "/"
title = "RouterU Arcade"
version = "1.0.0"
id = "artifacts/routeru-arcade"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23974

[services.development]
run = "pnpm --filter @workspace/routeru-arcade run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/routeru-arcade", "run", "build" ]
publicDir = "artifacts/routeru-arcade/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23974"
BASE_PATH = "/"
